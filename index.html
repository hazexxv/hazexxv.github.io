<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperion.bypass</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #ffffff;
            overflow-x: hidden;
        }
        .sakura-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .sakura-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(255, 182, 193, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 218, 185, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(255, 192, 203, 0.1) 0%, transparent 50%);
        }
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 3em;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .tab {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .tab:hover, .tab.active {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .games {
            display: none;
        }
        .games.active {
            display: block;
        }
        .search {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            backdrop-filter: blur(5px);
        }
        .game-count {
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .game-item {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-align: center;
        }
        .game-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .settings {
            display: none;
        }
        .settings.active {
            display: block;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .modal-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .modal-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
        }
        .modal-section h3 {
            margin-top: 0;
            color: #ffb6c1;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            backdrop-filter: blur(5px);
        }
        .game-ui {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            z-index: 2000;
        }
        .game-ui.active {
            display: block;
        }
        .game-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-iframe {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="sakura-bg"></div>
    <header>
        <h1>Hyperion.bypass</h1>
        <div class="tabs">
            <div class="tab active" data-tab="games">[G] Games</div>
            <div class="tab" data-tab="settings">[S] Settings</div>
        </div>
    </header>
    <div class="content">
        <div class="games active">
            <input type="text" class="search" placeholder="Search games...">
            <div class="game-count">Loading games...</div>
            <div class="game-list"></div>
        </div>
        <div class="settings">
            <div class="modal">
                <div class="modal-content">
                    <div class="modal-left">
                        <div class="modal-section">
                            <h3>Cloak</h3>
                            <button id="cloak-btn">Cloak Site</button>
                        </div>
                        <div class="modal-section">
                            <h3>Extra</h3>
                            <p>Christian - The only dev</p>
                            <input type="password" id="admin-key" placeholder="Enter admin key">
                            <button id="admin-login">Login</button>
                            <button id="admin-logout" class="hidden">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="game-ui">
        <div class="game-header">
            <button id="go-back">Go Back</button>
            <button id="fullscreen">Fullscreen</button>
            <button id="game-cloak">Cloak</button>
        </div>
        <iframe class="game-iframe" id="game-iframe"></iframe>
    </div>

    <script>
        let games = [];
        let adminGames = [];
        let isAdmin = false;

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content > div').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.querySelector(`.${tab.dataset.tab}`).classList.add('active');
            });
        });

        async function fetchGames() {
            try {
                const commitsResponse = await fetch('https://api.github.com/repos/elite-gamez/elite-gamez.github.io/commits');
                const commits = await commitsResponse.json();
                const sha = commits[0].sha;
                const gamesResponse = await fetch(`https://cdn.jsdelivr.net/gh/elite-gamez/elite-gamez.github.io@${sha}/games.json?cb=${Date.now()}`);
                const gamesData = await gamesResponse.json();
                games = gamesData.games || [];
                if (isAdmin) {
                    await fetchAdminGames();
                }
                displayGames();
            } catch (error) {
                console.error('Error fetching games:', error);
                document.querySelector('.game-count').textContent = 'Error loading games';
            }
        }

        async function fetchAdminGames() {
            try {
                const response = await fetch('https://api.github.com/repos/hazexxv/games/contents');
                const contents = await response.json();
                adminGames = contents.filter(item => item.name.endsWith('.xml')).map(item => ({
                    name: item.name.replace('.xml', ''),
                    url: item.download_url
                }));
            } catch (error) {
                console.error('Error fetching admin games:', error);
            }
        }

        function displayGames() {
            const allGames = [...games, ...adminGames];
            const searchTerm = document.querySelector('.search').value.toLowerCase();
            const filteredGames = allGames.filter(game => game.name.toLowerCase().includes(searchTerm));
            
            document.querySelector('.game-count').textContent = `Games: ${filteredGames.length}`;
            
            const gameList = document.querySelector('.game-list');
            gameList.innerHTML = '';
            
            filteredGames.forEach(game => {
                const gameItem = document.createElement('div');
                gameItem.className = 'game-item';
                gameItem.textContent = game.name;
                gameItem.addEventListener('click', () => openGame(game));
                gameList.appendChild(gameItem);
            });
        }

        document.querySelector('.search').addEventListener('input', displayGames);

        document.getElementById('cloak-btn').addEventListener('click', () => {
            const newTab = window.open('about:blank', '_blank');
            newTab.document.write(`
                <html>
                <head><title>Hyperion.bypass</title></head>
                <body style="margin:0;padding:0;">
                    <iframe src="${window.location.href}" style="width:100%;height:100%;border:none;"></iframe>
                </body>
                </html>
            `);
        });

        document.getElementById('admin-login').addEventListener('click', () => {
            const key = document.getElementById('admin-key').value;
            if (key === 'nodiddy') {
                isAdmin = true;
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-logout').classList.remove('hidden');
                fetchAdminGames().then(displayGames);
            } else {
                alert('Invalid admin key');
            }
        });

        document.getElementById('admin-logout').addEventListener('click', () => {
            isAdmin = false;
            adminGames = [];
            document.getElementById('admin-login').classList.remove('hidden');
            document.getElementById('admin-logout').classList.add('hidden');
            displayGames();
        });

        function openGame(game) {
            const iframe = document.getElementById('game-iframe');
            iframe.src = game.url;
            document.querySelector('.game-ui').classList.add('active');
        }

        document.getElementById('go-back').addEventListener('click', () => {
            document.querySelector('.game-ui').classList.remove('active');
            document.getElementById('game-iframe').src = '';
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            const iframe = document.getElementById('game-iframe');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            }
        });

        document.getElementById('game-cloak').addEventListener('click', () => {
            const iframe = document.getElementById('game-iframe');
            const newTab = window.open('about:blank', '_blank');
            newTab.document.write(`
                <html>
                <head><title>Game</title></head>
                <body style="margin:0;padding:0;">
                    <iframe src="${iframe.src}" style="width:100%;height:100%;border:none;"></iframe>
                </body>
                </html>
            `);
        });

        fetchGames();
    </script>
</body>
</html>
